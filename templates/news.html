<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hacker News</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    </head>
    <body>
            {% extends "navbar.html" %}

    {% block content %}
        <h1>Hacker News</h1>
        <ul>
            {% for news in news_list %}
     
                <li>
                    <a href="{{ news.url }}" target="_blank">
                        {{ news.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </body>
    {% endblock %}
</html>
